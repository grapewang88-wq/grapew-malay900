<style>
:root{
  --bg:#f4f6f9; --card:#fff; --ink:#22272e; --sub:#6b7280; --line:#e5e8ee;
  --p:#0f6a4e; --p-soft:#e0f2ec; --amber:#b45309; --amber-soft:#fef3c7;
  --blue:#1d4ed8; --blue-soft:#dbeafe; --red:#b91c1c; --red-soft:#fee2e2;
  --gold:#92400e; --gold-soft:#fde68a;
}
@media (prefers-color-scheme: dark){
  :root{--bg:#15181d; --card:#1e232b; --ink:#e6e9ee; --sub:#9aa3b2; --line:#2c333e;
  --p:#34d399; --p-soft:#0c2b21; --amber:#fbbf24; --amber-soft:#3a2c08;
  --blue:#93c5fd; --blue-soft:#12233f; --red:#f87171; --red-soft:#3a1414;
  --gold:#fcd34d; --gold-soft:#3a2e08;}
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;-webkit-tap-highlight-color:transparent}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 80px}
header{display:flex;justify-content:space-between;align-items:center;padding:6px 2px 14px;flex-wrap:wrap;gap:8px}
header h1{font-size:17px}
header .meta{font-size:12.5px;color:var(--sub)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
.btn{display:inline-block;border:none;border-radius:10px;padding:10px 18px;font-size:15px;cursor:pointer;background:var(--p);color:#fff;font-family:inherit}
.btn.big{width:100%;padding:15px;font-size:17px;font-weight:700}
.btn.ghost{background:transparent;color:var(--p);border:1.5px solid var(--p)}
.btn.gray{background:transparent;color:var(--sub);border:1.5px solid var(--line)}
.btn.warn{background:var(--red)}
.btn.small{padding:6px 12px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:default}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;font-size:11.5px;font-weight:700;border-radius:5px;padding:1px 7px;vertical-align:1px}
.b1{background:var(--blue-soft);color:var(--blue)} .b2{background:var(--amber-soft);color:var(--amber)}
.b3{background:var(--p-soft);color:var(--p)} .bm{background:var(--gold-soft);color:var(--gold)}
.b0{background:var(--line);color:var(--sub)}
.bar{height:9px;background:var(--line);border-radius:5px;overflow:hidden;margin:4px 0 2px}
.bar>div{height:100%;border-radius:5px}
.lvlrow{margin:10px 0}
.lvlrow .t{display:flex;justify-content:space-between;font-size:13.5px}
h2{font-size:16.5px;margin-bottom:10px}
.sub{color:var(--sub);font-size:13px}
.malay{font-size:21px;font-weight:700;line-height:1.5}
.zh{font-size:16.5px}
.stepbar{display:flex;gap:6px;margin-bottom:14px}
.stepbar div{flex:1;text-align:center;font-size:12px;padding:7px 2px;border-radius:8px;background:var(--card);border:1px solid var(--line);color:var(--sub)}
.stepbar div.on{background:var(--p);color:#fff;border-color:var(--p);font-weight:700}
.stepbar div.done{background:var(--p-soft);color:var(--p);border-color:var(--p-soft)}
.timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:15px;color:var(--p)}
.opt{display:block;width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;margin:7px 0;font-size:15.5px;cursor:pointer;color:var(--ink);font-family:inherit}
.opt.right{border-color:var(--p);background:var(--p-soft)}
.opt.wrong{border-color:var(--red);background:var(--red-soft)}
.tile{display:inline-block;background:var(--blue-soft);color:var(--blue);border:1.5px solid transparent;border-radius:8px;padding:6px 11px;margin:4px;font-size:16px;font-weight:600;cursor:pointer;user-select:none}
.tile.used{opacity:.25;pointer-events:none}
.buildzone{min-height:52px;border:1.5px dashed var(--line);border-radius:10px;padding:6px;margin:10px 0}
.buildzone .tile{background:var(--p-soft);color:var(--p)}
.gradebtns{display:flex;gap:8px;margin-top:14px}
.gradebtns .btn{flex:1;text-align:center}
.g-again{background:var(--red)} .g-good{background:var(--p)} .g-easy{background:var(--blue)}
.play{background:none;border:1.5px solid var(--p);color:var(--p);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;flex:none}
.wordcard{border-bottom:1px solid var(--line);padding:11px 0}
.wordcard:last-child{border:none}
.wordcard .w{font-size:18px;font-weight:700}
.wordcard .m{color:var(--p);font-size:14.5px;margin-left:8px}
.ex{font-size:13.5px;color:var(--sub);margin-top:3px}
.banner{background:var(--amber-soft);color:var(--amber);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.stat{background:var(--bg);border-radius:10px;padding:10px 6px;text-align:center}
.stat .n{font-size:20px;font-weight:800}
.stat .l{font-size:11.5px;color:var(--sub)}
select,input[type=number]{font-family:inherit;font-size:14px;padding:6px 9px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);color:var(--ink)}
.chap{cursor:pointer;padding:11px 4px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;font-size:14.5px}
.slist{border-top:1px solid var(--line)}
.sitem{padding:10px 4px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:flex-start}
.sitem .tx{flex:1}
.sitem .ma{font-size:15.5px;font-weight:600}
.sitem .zc{font-size:13px;color:var(--sub)}
.center{text-align:center}
.hidden{display:none!important}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:5}
footer button{flex:1;background:none;border:none;padding:11px 4px;font-size:12.5px;color:var(--sub);cursor:pointer;font-family:inherit}
footer button.on{color:var(--p);font-weight:700}
.cw{cursor:pointer;border-bottom:1px dotted var(--sub)}
.cw:hover,.cw:active{background:var(--blue-soft);border-radius:3px}
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:16px 16px 0 0;padding:18px 18px 30px;z-index:21;max-height:72vh;overflow:auto;border-top:1px solid var(--line);max-width:760px;margin:0 auto}
.sheet h3{font-size:21px;display:inline}
.whit{color:var(--p);font-weight:700}
.wmiss{color:var(--red);font-weight:700;border-bottom:2px solid var(--red)}
.scorebig{font-size:36px;font-weight:800}
.mic{background:var(--red);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:15px;cursor:pointer;font-family:inherit}
.mic.listening{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.wbitem{border-bottom:1px solid var(--line);padding:10px 0;display:flex;gap:10px;align-items:center}
.wbitem .w{font-size:17px;font-weight:700}
.wbitem .g{color:var(--p);font-size:13.5px}
.errn{font-size:11.5px;background:var(--red-soft);color:var(--red);border-radius:5px;padding:1px 7px}
.okn{font-size:11.5px;background:var(--p-soft);color:var(--p);border-radius:5px;padding:1px 7px}
.done-icon{font-size:52px}
.pill{font-size:12px;border:1px solid var(--line);border-radius:20px;padding:3px 10px;color:var(--sub);cursor:pointer}
.pill.on{background:var(--p);color:#fff;border-color:var(--p)}
</style>
</head>

function getCard(id){ return S.cards[id]; }
function newCard(id){ S.cards[id] = {lvl:1, ef:2.5, ivl:0, due:dayNum(), reps:0, lreps:0, lapses:0, intro:todayKey()}; return S.cards[id]; }
function grade(card, g){ // g: 0 again, 1 good, 2 easy
  card.reps++;
  if(g===0){ card.lapses++; card.lreps=0; card.ivl=1; card.ef=Math.max(1.3, card.ef-0.2); }
  else{
    card.lreps=(card.lreps||0)+1;
    if(g===2) card.ef=Math.min(3.0, card.ef+0.05);
    if(card.ivl<=0) card.ivl = g===2?3:1;
    else if(card.ivl===1) card.ivl = g===2?5:3;
    else card.ivl = Math.round(card.ivl * card.ef * (g===2?1.25:1));
    card.ivl = Math.min(card.ivl, 365);
    // 升级判定
    if(card.lvl===1 && card.lreps>=3 && card.ivl>=7){ card.lvl=2; card.ivl=2; card.lreps=0; }
    else if(card.lvl===2 && card.lreps>=3 && card.ivl>=12){ card.lvl=3; card.ivl=3; card.lreps=0; }
    else if(card.lvl===3 && card.lreps>=2 && card.ivl>=30){ card.lvl=4; }
  }
  card.due = dayNum() + Math.max(1,card.ivl);
}

    || VOICES.find(v=>/ms[-_]MY/i.test(v.lang))
    || VOICES.find(v=>/^ms/i.test(v.lang))
    || VOICES.find(v=>/id[-_]ID/i.test(v.lang))

function speak(text, rate){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\(.*?\)/g,''));
  if(VOICE){ u.voice = VOICE; u.lang = VOICE.lang; }
  else u.lang = 'ms-MY'; // 没有匹配语音也强制按马来语发声——多数安卓引擎能处理
  u.rate = rate || S.settings.rate;
  speechSynthesis.speak(u);
}

function wordify(malay){
  return malay.split(/(\s+)/).map(part=>{
    if(/^\s+$/.test(part)||!part) return part;
    const clean = part.replace(/[.,!?;:"“”'’()（）]/g,'').toLowerCase();
    if(!clean) return esc(part);
    return '<span class="cw" data-w="'+esc(clean)+'" onclick="event.stopPropagation();showWord(this.dataset.w)">'+esc(part)+'</span>';
  }).join('');
}
function lookupWord(w){
  if(GLOSSARY[w]) return {key:w, g:GLOSSARY[w]};
  const mk = Object.keys(GLOSSARY).find(k=>k.includes(' ') && k.split(' ').includes(w));
  if(mk) return {key:mk, g:GLOSSARY[mk], multi:true};
  return null;
}

/* ============ 跟读语音识别评分 ============ */
function recAvail(){ return (typeof window!=='undefined') && (window.SpeechRecognition||window.webkitSpeechRecognition); }
function lev(a,b){
  if(a===b) return 0;
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=Array.from({length:n+1},(_,i)=>i);
  for(let i=1;i<=m;i++){ const cur=[i];
    for(let j=1;j<=n;j++) cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur; }
  return prev[n];
}
function scoreAgainst(target, heardList){
  const T = tokens(target).map(x=>x.toLowerCase());
  let best={pct:0, flags:T.map(()=>false), heard:''};
  for(const heard of heardList){
    const H = tokens(heard).map(x=>x.toLowerCase());
    const used = new Array(H.length).fill(false);
    const flags = T.map(t=>{
      const tol = t.length>=5?2:(t.length>=3?1:0);
      const i = H.findIndex((h,j)=>!used[j] && (h===t || lev(h,t)<=tol));
      if(i>=0){ used[i]=true; return true; } return false;
    });
    const pct = Math.round(flags.filter(Boolean).length/T.length*100);
    if(pct>=best.pct) best={pct, flags, heard};
  }
  return best;
}
let recObj=null;
function startRec(target, onDone){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  const r = new SR(); recObj=r;
  r.lang=S.settings.recLang||'ms-MY'; r.interimResults=false; r.maxAlternatives=5;
  let got=false;
  r.onresult = e=>{ got=true; const alts=[]; for(let i=0;i<e.results[0].length;i++) alts.push(e.results[0][i].transcript); onDone(scoreAgainst(target, alts)); };
  r.onerror = e=>{ got=true; onDone({error:e.error}); };
  r.onend = ()=>{ if(!got) onDone({error:'no-speech'}); };
  try{ r.start(); }catch(e){ onDone({error:'start-failed'}); }
}
function stopRec(){ try{ recObj&&recObj.stop(); }catch(e){} }

/* ============ 朋友圈打卡卡片生成 ============ */
function wrapLines(text, maxChars){
  const words=text.split(' '); const lines=[]; let cur='';
  for(const w of words){
    if((cur+' '+w).trim().length>maxChars && cur){ lines.push(cur); cur=w; } else cur=(cur+' '+w).trim();
  }
  if(cur) lines.push(cur);
  return lines;
}
function genCard(malay, chinese){
  const cv=document.createElement('canvas'); cv.width=1080; cv.height=1350;
  const g=cv.getContext('2d');
  const gr=g.createLinearGradient(0,0,0,1350); gr.addColorStop(0,'#0d5c44'); gr.addColorStop(1,'#0a3a2c');
  g.fillStyle=gr; g.fillRect(0,0,1080,1350);
  g.fillStyle='rgba(255,255,255,.06)'; g.beginPath(); g.arc(930,150,300,0,7); g.fill();
  g.beginPath(); g.arc(80,1250,220,0,7); g.fill();
  g.fillStyle='rgba(255,255,255,.75)'; g.font='38px "Microsoft YaHei"';
  g.fillText('🌺 我的马来语打卡', 80, 130);
  g.fillStyle='rgba(255,255,255,.28)'; g.font='italic bold 160px Georgia';
  g.fillText('“', 60, 340);
  let y=430; g.fillStyle='#fff'; g.font='bold 62px "Microsoft YaHei"';
  wrapLines(malay, 26).slice(0,6).forEach(l=>{ g.fillText(l, 80, y); y+=92; });
  y+=30; g.fillStyle='rgba(255,255,255,.85)'; g.font='42px "Microsoft YaHei"';
  wrapLines(chinese.split('').join(' '), 45).map(l=>l.replace(/ /g,'')).slice(0,4).forEach(l=>{ g.fillText(l, 80, y); y+=64; });
  const days=Object.keys(S.log).length + (S.log[todayKey()]?0:1);
  const c=levelCounts();
  g.fillStyle='rgba(255,255,255,.55)'; g.font='34px "Microsoft YaHei"';
  g.fillText(todayKey()+' · 学习第 '+days+' 天 · 已学 '+(900-c[0])+'/900 句', 80, 1190);
  g.fillText('—— 《马来西亚语900句》每日打卡', 80, 1250);
  const a=document.createElement('a');
  a.href=cv.toDataURL('image/png'); a.download='马来语打卡_'+todayKey()+'.png'; a.click();
}

  const todayLog = S.log[todayKey()];

  const wbN = Math.min(6, wbActive().length);
  const est = Math.round(newN*1.9 + due*0.28 + wbN*0.4 + 6);
  view().innerHTML = `
  <div class="card">
    <h2>学习进度 <span class="sub">${learned}/900 句已开始 · ${c[4]} 句精通</span></h2>
    ${[1,2,3].map(l=>{
      const reached = [1,2,3].filter(x=>x>=l).reduce((t,x)=>t+c[x],0)+c[4];
      const pct=(reached/900*100).toFixed(1);
      const desc = l===1?'看懂马来语':(l===2?'听懂并能跟读':'凭中文独立造出句子');
      return `<div class="lvlrow"><div class="t"><span><span class="badge ${LVL_CLS[l]}">${LVL_NAME[l]}</span> ${desc}</span><span class="sub">${reached}/900 (${pct}%)</span></div>
      <div class="bar"><div style="width:${pct}%;background:${l===1?'var(--blue)':l===2?'var(--amber)':'var(--p)'}"></div></div></div>`;
    }).join('')}
  </div>
  <div class="card">
    <h2>今日任务</h2>
    <div class="statgrid">
      <div class="stat"><div class="n">${wbN}</div><div class="l">错词抽测</div></div>
      <div class="stat"><div class="n">${newN}</div><div class="l">新句</div></div>
      <div class="stat"><div class="n">${due}</div><div class="l">到期复习</div></div>
      <div class="stat"><div class="n">≈${est}</div><div class="l">预计分钟${todayLog?'·今日已学':''}</div></div>
    </div>
    <button class="btn big" onclick="startSession()">▶ 开始今日学习（五环节 · 约40分钟）</button>
    <div class="row" style="margin-top:10px">
      <button class="btn ghost small" onclick="quickShadow()">🎧 只做听力循环</button>
      <button class="btn ghost small" onclick="quickQuiz()">✍️ 只做复习测试</button>
    </div>
  </div>
  <div class="card sub" style="font-size:13px">
    <b>方法说明</b>：每句话都会经历 <span class="badge b1">①认读</span>→<span class="badge b2">②听说</span>→<span class="badge b3">③运用</span>→<span class="badge bm">★精通</span> 四个阶段。程序按记忆曲线（SM-2 间隔重复算法）在你即将遗忘的时间点安排复习：答对间隔拉长（1→3→7→17→40天…），答错缩短重来。每天五个环节：错词抽测 → 重点单词（低频难词优先）→ 听力跟读（🎙语音识别打分，读错的词自动进单词本）→ 复习测试 → 造句运用。<b>任何界面里带下划线的马来语单词都可以点击查看释义</b>。坚持每天40分钟，按默认10句/天，约3个月学完全书、5-6个月全部达到精通。
  </div>`;
}

/* ================= 学习会话 ================= */
const SESSION={active:false, step:0, newIds:[], due:[], quizQueue:[], buildQueue:[], qi:0, bi:0, si:0, wi:0, words:[], t0:0, counts:{quiz:0,quizRight:0}};
let timerInt=null;
function startTimer(){ SESSION.t0=Date.now(); stopTimer(); timerInt=setInterval(()=>{ const s=Math.floor((Date.now()-SESSION.t0)/1000); $('#hdrTimer').textContent='⏱ '+String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); },1000); }
function stopTimer(){ if(timerInt){clearInterval(timerInt);timerInt=null;} $('#hdrTimer')&&($('#hdrTimer').textContent=''); }

function startSession(){
  SESSION.active=true; SESSION.step=1; SESSION.counts={quiz:0,quizRight:0,wb:0,wbRight:0};
  SESSION.newIds = nextNewIds(S.settings.newPerDay);
  SESSION.due = dueCards();
  // 单词本抽测队列：错得最多的优先，每天最多6个
  SESSION.wbQueue = wbActive().sort((a,b)=>(b[1].err-b[1].right)-(a[1].err-a[1].right)).slice(0,6).map(([w])=>w);
  SESSION.wbi=0;
  // 重点单词：从新句中选词——低频难词优先（高频词天天见反而好记，低频词才是遗忘重灾区）
  const known=new Set(S.knownWords);
  const cand={};
  SESSION.newIds.forEach(id=>tokens(BY_ID[id].malay).forEach(w=>{
    const k=w.toLowerCase(); if(known.has(k)) return;
    if(!cand[k]) cand[k]={w:k, f:FREQ[k]||1, ex:id};
  }));
  SESSION.words = Object.values(cand).sort((a,b)=>a.f-b.f).slice(0,10);
  SESSION.wi=0; SESSION.si=0; SESSION.qi=0; SESSION.bi=0;
  // 测试队列：到期复习卡
  SESSION.quizQueue = SESSION.due.filter(id=>S.cards[id].lvl<3);
  SESSION.buildQueue = SESSION.due.filter(id=>S.cards[id].lvl>=3).slice(0,10);
  startTimer(); renderStep();
}
function stepbar(){
  const names=['① 错词抽测','② 重点单词','③ 听力跟读','④ 复习测试','⑤ 造句运用'];
  return `<div class="stepbar">${names.map((n,i)=>`<div class="${i+1===SESSION.step?'on':(i+1<SESSION.step?'done':'')}">${n}</div>`).join('')}</div>`;
}
function renderStep(){
  if(SESSION.step===1) renderWbQuiz();
  else if(SESSION.step===2) renderWords();
  else if(SESSION.step===3) renderShadow();
  else if(SESSION.step===4) renderQuiz();
  else if(SESSION.step===5) renderBuild();
  else renderDone();
}

/* --- ① 错词抽测（单词本） --- */
function renderWbQuiz(){
  const q=SESSION.wbQueue;
  if(!q.length || SESSION.wbi>=q.length){
    if(!q.length) return nextStep();
    view().innerHTML=stepbar()+`<div class="card center"><div class="done-icon">📒</div><p>错词抽测完成：${SESSION.counts.wbRight}/${SESSION.counts.wb} 正确</p><button class="btn big" onclick="nextStep()">进入重点单词 →</button></div>`;
    return;
  }
  const w=q[SESSION.wbi], hit=lookupWord(w), wb=S.wordbook[w];
  if(hit){ // 有词义 → 四选一
    const wrongs = shuffle(Object.values(GLOSSARY).filter(g=>g!==hit.g)).slice(0,3);
    const opts = shuffle([hit.g, ...wrongs]);
    view().innerHTML = stepbar()+`<div class="card">
      <h2>错词抽测 <span class="sub">${SESSION.wbi+1}/${q.length}</span> <span class="errn">已错${wb.err}次</span></h2>
      <div class="row" style="margin:16px 0"><span class="malay">${esc(w)}</span><button class="play" onclick="speak('${esc(w)}')">🔊</button></div>
      <div>${opts.map(o=>`<button class="opt" data-r="${o===hit.g?1:0}" onclick="answerWb(this,'${esc(w)}')">${esc(o)}</button>`).join('')}</div>
    </div>`;
  } else { // 无词义 → 看例句自评
    const exs = SENTENCES.filter(s=>tokens(s.malay).some(t=>t.toLowerCase()===w)).slice(0,2);
    view().innerHTML = stepbar()+`<div class="card">
      <h2>错词抽测 <span class="sub">${SESSION.wbi+1}/${q.length}</span> <span class="errn">已错${wb.err}次</span></h2>
      <div class="row" style="margin:16px 0"><span class="malay">${esc(w)}</span><button class="play" onclick="speak('${esc(w)}')">🔊</button></div>
      <p class="sub">回想这个词的意思，然后翻面对照例句：</p>
      <div id="wbAns" class="center" style="margin-top:10px"><button class="btn ghost big" onclick="this.parentElement.innerHTML=document.getElementById('wbHidden').innerHTML">显示例句</button></div>
      <div id="wbHidden" class="hidden">${exs.map(s=>`<div class="ex" style="border-top:1px solid var(--line);padding:6px 0">${wordify(s.malay)}<br>${esc(s.chinese)}</div>`).join('')}
        <div class="gradebtns"><button class="btn g-again" onclick="gradeWb('${esc(w)}',0)">没想起来</button><button class="btn g-good" onclick="gradeWb('${esc(w)}',1)">想起来了</button></div></div>
    </div>`;
  }
}
function answerWb(el,w){
  const right = el.dataset.r==='1';
  document.querySelectorAll('.opt').forEach(o=>{o.disabled=true; if(o.dataset.r==='1')o.classList.add('right');});
  if(!right) el.classList.add('wrong');
  gradeWbCore(w,right);
  const box=document.createElement('div'); box.className='gradebtns';
  box.innerHTML=`<button class="btn ${right?'g-good':'g-again'}" onclick="SESSION.wbi++;renderWbQuiz()">${right?'下一个 →':'记住了，下一个 →'}</button>`;
  el.parentElement.parentElement.appendChild(box);
}
function gradeWb(w,g){ gradeWbCore(w,g===1); SESSION.wbi++; renderWbQuiz(); }
function gradeWbCore(w,right){
  const wb=S.wordbook[w]; if(!wb) return;
  SESSION.counts.wb++; if(right){SESSION.counts.wbRight++; wb.right++;} else wb.err++;
  save();
}
function nextStep(){ SESSION.step++; renderStep(); }

/* --- ① 重点单词 --- */
function renderWords(){
  if(!SESSION.words.length || !SESSION.newIds.length){
    if(!SESSION.newIds.length){SESSION.step=3;return renderStep();} // 全书学完只复习
    return nextStep();
  }
  view().innerHTML = stepbar()+`
  <div class="card">
    <h2>今天新句子中的重点单词 <span class="sub">${SESSION.words.length} 个 · 低频难词优先 · 目标≈6分钟</span></h2>
    <div class="sub" style="margin-bottom:6px">按"全书出现次数"从少到多排列——高频词天天见不用担心，这些低频词才是遗忘重灾区。点🔊听发音，确实已掌握的点"认识"以后不再出现。</div>
    ${SESSION.words.map((w,i)=>{
      const g=GLOSSARY[w.w]; const ex=BY_ID[w.ex];
      return `<div class="wordcard" id="wc${i}">
        <div class="row"><button class="play" onclick="speak('${esc(w.w)}')">🔊</button>
        <div style="flex:1"><span class="w">${esc(w.w)}</span><span class="m">${g?esc(g):'(见例句语境)'}</span><span class="sub" style="margin-left:6px">全书出现${w.f}次</span>
        <div class="ex">${esc(ex.malay)}<br>${esc(ex.chinese)}</div></div>
        <button class="btn gray small" onclick="knowWord('${esc(w.w)}',${i})">认识</button></div>
      </div>`;}).join('')}
    <button class="btn big" style="margin-top:12px" onclick="nextStep()">完成，进入听力跟读 →</button>
  </div>`;
}
function knowWord(w,i){ if(!S.knownWords.includes(w)) S.knownWords.push(w); save(); document.getElementById('wc'+i).style.opacity=.35; }

/* --- ② 听力跟读 --- */
function renderShadow(){
  const ids=SESSION.newIds;
  if(!ids.length) return nextStep();
  const i=SESSION.si;
  if(i>=ids.length){
    view().innerHTML=stepbar()+`<div class="card center"><div class="done-icon">🎧</div><p>跟读完成！新句已加入记忆队列，明天开始测试。</p><button class="btn big" onclick="nextStep()">进入复习测试 →</button></div>`;
    return;
  }
  const s=BY_ID[ids[i]];
  if(!S.cards[s.id]) newCard(s.id);
  save();
  const hasRec = recAvail();
  view().innerHTML = stepbar()+`
  <div class="card">
    <h2>听力跟读 <span class="sub">${i+1}/${ids.length} · 目标≈12分钟</span></h2>
    <div class="sub">先听2遍 → 出声跟读 → 点🎙让程序听你读并打分（不认识的词直接点它看释义）。</div>
    <div style="margin:18px 0 6px" class="malay" id="shadowText">${wordify(s.malay)}</div>
    <div class="zh sub">${esc(s.chinese)}</div>
    <div class="row" style="margin-top:16px">
      <button class="btn" onclick="speak('${esc(s.malay).replace(/'/g,"\\'")}')">🔊 正常速</button>
      <button class="btn ghost" onclick="speak('${esc(s.malay).replace(/'/g,"\\'")}',0.6)">🐢 慢速</button>
      ${hasRec?`<button class="mic" id="micBtn" onclick="doShadowRec(${s.id})">🎙 跟读评分</button>`:''}
    </div>
    ${hasRec?'':'<div class="sub" style="margin-top:8px">⚠️ 当前浏览器不支持语音识别（跟读评分不可用），建议改用 Edge/Chrome 并联网。</div>'}
    <div id="recResult"></div>
    <div class="gradebtns">
      ${i>0?'<button class="btn gray" onclick="SESSION.si--;renderShadow()">← 上一句</button>':''}
      <button class="btn g-good" id="shadowNext" onclick="SESSION.si++;renderShadow()">下一句 →</button>
    </div>
  </div>`;
  speak(s.malay);
}
function doShadowRec(id){
  const s=BY_ID[id], btn=document.getElementById('micBtn'), out=document.getElementById('recResult');
  speechSynthesis.cancel();
  btn.classList.add('listening'); btn.textContent='🎙 请开始朗读…'; btn.disabled=true;
  out.innerHTML='';
  startRec(s.malay, res=>{
    btn.classList.remove('listening'); btn.textContent='🎙 再测一次'; btn.disabled=false;
    if(res.error){
      const msg={'not-allowed':'麦克风权限被拒绝——请点击地址栏🔒图标允许麦克风','no-speech':'没有听到声音，请靠近麦克风大声读','network':'语音识别需要联网（Chrome/Edge 的识别在云端进行）','audio-capture':'未检测到麦克风设备'}[res.error]||('识别失败：'+res.error);
      out.innerHTML=`<p class="sub" style="color:var(--red);margin-top:10px">⚠️ ${msg}</p>`;
      return;
    }
    const T=tokens(s.malay);
    const colored=T.map((w,j)=>`<span class="${res.flags[j]?'whit':'wmiss'} cw" data-w="${esc(w.toLowerCase().replace(/[.,!?]/g,''))}" onclick="showWord(this.dataset.w)">${esc(w)}</span>`).join(' ');
    // 读错的词自动进单词本
    const missed=T.filter((w,j)=>!res.flags[j]).map(w=>w.toLowerCase()).filter(w=>w.length>=3&&!/^\d+$/.test(w));
    missed.forEach(w=>addWB(w,'auto'));
    const lvl = res.pct>=80?['🌟 优秀！','var(--p)']:res.pct>=60?['👍 及格，红色词再练','var(--amber)']:['💪 再来一遍，先听慢速','var(--red)'];
    out.innerHTML=`<div style="margin-top:12px;padding:12px;border-radius:10px;background:var(--bg)">
      <span class="scorebig" style="color:${lvl[1]}">${res.pct}</span><span class="sub">/100</span>
      <span style="margin-left:10px;font-weight:700;color:${lvl[1]}">${lvl[0]}</span>
      <div style="margin-top:8px;font-size:17px;line-height:1.9">${colored}</div>
      ${missed.length?`<div class="sub" style="margin-top:6px">未读准：${missed.map(esc).join('、')} → 已自动加入📒单词本</div>`:''}
      ${res.heard?`<div class="sub" style="margin-top:4px">识别到：${esc(res.heard)}</div>`:''}
      ${res.pct<30?`<div class="sub" style="margin-top:6px;color:var(--amber)">💡 分数异常低？若"识别到"显示的是中文或乱码，说明识别引擎语言不匹配——去 ⚙️设置 把"识别语言"切换为印尼语(id-ID)再试，印尼语引擎识别马来语朗读效果通常更好。</div>`:''}
    </div>`;
  });
}

/* --- ③ 复习测试 --- */
function renderQuiz(){
  const q=SESSION.quizQueue;
  if(SESSION.qi>=q.length){
    view().innerHTML=stepbar()+`<div class="card center"><div class="done-icon">✍️</div><p>测试完成：${SESSION.counts.quizRight}/${SESSION.counts.quiz} 正确</p><button class="btn big" onclick="nextStep()">进入造句运用 →</button></div>`;
    return;
  }
  const id=q[SESSION.qi], card=S.cards[id], s=BY_ID[id];
  if(card.lvl===1) quizL1(s,card); else quizL2(s,card);
}
function quizHead(card,extra){
  return stepbar()+`<div class="card"><h2>复习测试 <span class="sub">${SESSION.qi+1}/${SESSION.quizQueue.length}</span> <span class="badge ${LVL_CLS[card.lvl]}">${LVL_NAME[card.lvl]}</span> ${extra||''}</h2>`;
}
function quizL1(s,card){ // 马→中 四选一
  const wrong = shuffle(SENTENCES.filter(x=>x.id!==s.id && x.chinese!==s.chinese)).slice(0,3).map(x=>x.chinese);
  const opts = shuffle([s.chinese, ...wrong]);
  view().innerHTML = quizHead(card)+`
    <div class="malay" style="margin:14px 0 4px" id="qMalay">${esc(s.malay)}</div>
    <button class="play" onclick="speak('${esc(s.malay).replace(/'/g,"\\'")}')">🔊</button>
    <div style="margin-top:8px">${opts.map(o=>`<button class="opt" data-r="${o===s.chinese?1:0}" onclick="answerL1(this,${s.id})">${esc(o)}</button>`).join('')}</div>
  </div>`;
}
function answerL1(el,id){
  const right = el.dataset.r==='1'; const card=S.cards[id];
  document.getElementById('qMalay').innerHTML = wordify(BY_ID[id].malay); // 答题后单词可点查释义
  document.querySelectorAll('.opt').forEach(o=>{ o.disabled=true; if(o.dataset.r==='1') o.classList.add('right'); });
  if(!right) el.classList.add('wrong');
  SESSION.counts.quiz++; if(right) SESSION.counts.quizRight++;
  grade(card, right?1:0); save();
  const box=document.createElement('div'); box.className='gradebtns';
  box.innerHTML = right
    ? `<button class="btn g-easy" onclick="bonusEasy(${id})">很轻松(间隔+)</button><button class="btn g-good" onclick="SESSION.qi++;renderQuiz()">下一题 →</button>`
    : `<button class="btn g-again" onclick="SESSION.qi++;renderQuiz()">记住了，下一题 →</button>`;
  el.parentElement.parentElement.appendChild(box);
}
function bonusEasy(id){ const c=S.cards[id]; c.ivl=Math.round(c.ivl*1.3)+1; c.due=dayNum()+c.ivl; save(); SESSION.qi++; renderQuiz(); }
function quizL2(s,card){ // 听音辨义 + 自评
  view().innerHTML = quizHead(card,'<span class="sub">听音频→心里说出意思→再跟读一遍→翻面自评</span>')+`
    <div class="center" style="margin:22px 0">
      <button class="btn" onclick="speak('${esc(s.malay).replace(/'/g,"\\'")}')">🔊 播放</button>
      <button class="btn ghost" onclick="speak('${esc(s.malay).replace(/'/g,"\\'")}',0.6)">🐢 慢速</button>
    </div>
    <div id="ansZone" class="center"><button class="btn big ghost" onclick="revealL2(${s.id})">显示答案</button></div>
  </div>`;
  speak(s.malay);
}
function revealL2(id){
  const s=BY_ID[id];
  document.getElementById('ansZone').innerHTML = `
    <div class="malay" style="margin:8px 0">${wordify(s.malay)}</div>
    <div class="zh">${esc(s.chinese)}</div>
    <div class="gradebtns">
      <button class="btn g-again" onclick="gradeQuiz(${id},0)">没听懂</button>
      <button class="btn g-good" onclick="gradeQuiz(${id},1)">听懂了</button>
      <button class="btn g-easy" onclick="gradeQuiz(${id},2)">秒懂</button>
    </div>`;
}
function gradeQuiz(id,g){ SESSION.counts.quiz++; if(g>0)SESSION.counts.quizRight++; grade(S.cards[id],g); save(); SESSION.qi++; renderQuiz(); }

/* --- ④ 造句运用 --- */
let BUILD={sel:[],toks:[]};
function renderBuild(){
  const q=SESSION.buildQueue;
  if(SESSION.bi>=q.length){
    // 自由造句提示
    const tip = SESSION.newIds.length? BY_ID[SESSION.newIds[Math.floor(Math.random()*SESSION.newIds.length)]] : BY_ID[SENTENCES[Math.floor(Math.random()*900)].id];
    view().innerHTML=stepbar()+`<div class="card">
      <h2>自由造句（收尾）</h2>
      <p class="sub">拿今天这句做模板，替换其中的成分（人/地点/数字/物品），写出你自己的句子：</p>
      <div class="malay" style="margin:10px 0">${wordify(tip.malay)}</div>
      <div class="zh sub">${esc(tip.chinese)}</div>
      <input type="text" id="freeMalay" placeholder="输入你的马来语句子…" style="width:100%;padding:10px;font-size:16px;margin-top:12px" autocomplete="off">
      <input type="text" id="freeZh" placeholder="它的中文意思（卡片副标题，可留空）" style="width:100%;padding:10px;font-size:14px;margin-top:8px" autocomplete="off">
      <div class="row" style="margin-top:10px">
        <button class="btn ghost" onclick="speak(document.getElementById('freeMalay').value)">🔊 听我的句子</button>
        <button class="btn" onclick="genCard(document.getElementById('freeMalay').value||'${esc(tip.malay).replace(/'/g,"\\'")}', document.getElementById('freeZh').value||'${esc(tip.chinese).replace(/'/g,"\\'")}')">🖼 一键生成朋友圈打卡卡片</button>
      </div>
      <p class="sub" style="margin-top:8px">卡片会以图片(PNG)保存到下载文件夹，含今日句子、学习天数和进度，发朋友圈直接选图即可。</p>
      <button class="btn big" style="margin-top:12px" onclick="finishSession()">✅ 完成今日学习</button>
    </div>`;
    return;
  }
  const id=q[SESSION.bi], s=BY_ID[id];
  BUILD.toks = tokens(s.malay); BUILD.sel=[];
  const disp = shuffle(BUILD.toks.map((w,i)=>({w,i})));
  view().innerHTML = stepbar()+`
  <div class="card">
    <h2>造句运用 <span class="sub">${SESSION.bi+1}/${q.length}</span> <span class="badge b3">③运用</span></h2>
    <div class="zh" style="margin:10px 0"><b>${esc(s.chinese)}</b></div>
    <div class="sub">先在心里说出马来语，再点词块拼句——或点"⌨️键盘输入"直接打出来（更接近真实运用）：</div>
    <div class="buildzone" id="bz"></div>
    <div id="tiles">${disp.map(t=>`<span class="tile" data-i="${t.i}" onclick="pickTile(this)">${esc(t.w)}</span>`).join('')}</div>
    <div class="row" style="margin-top:10px">
      <button class="btn ghost small" onclick="undoTile()">← 撤销</button>
      <button class="btn small" onclick="checkBuild(${id})">检查拼句</button>
      <button class="btn ghost small" onclick="document.getElementById('typedZone').classList.toggle('hidden')">⌨️ 键盘输入</button>
      <button class="btn gray small" onclick="giveupBuild(${id})">不会，看答案</button>
    </div>
    <div id="typedZone" class="hidden" style="margin-top:10px">
      <input type="text" id="typedInp" placeholder="直接输入整句马来语（不区分大小写，标点可省略）" style="width:100%;padding:10px;font-size:16px" autocomplete="off">
      <button class="btn small" style="margin-top:8px" onclick="checkTyped(${id})">检查输入</button>
    </div>
    <div id="buildResult"></div>
  </div>`;
}
function checkTyped(id){
  const s=BY_ID[id];
  const T=tokens(s.malay).map(x=>x.toLowerCase());
  const H=tokens(document.getElementById('typedInp').value||'').map(x=>x.toLowerCase());
  const flags=T.map((t,i)=>i<H.length && (H[i]===t || lev(H[i],t)<=(t.length>=6?1:0)));
  const ok = H.length===T.length && flags.every(Boolean);
  const r=document.getElementById('buildResult');
  if(ok){
    grade(S.cards[id],1); save(); speak(s.malay);
    r.innerHTML=`<p style="color:var(--p);font-weight:700;margin-top:10px">✅ 正确！${wordify(s.malay)}</p>
    <div class="gradebtns"><button class="btn ghost" onclick="genCardById(${id})">🖼 生成打卡卡片</button><button class="btn g-easy" onclick="bonusEasy2(${id})">很轻松</button><button class="btn g-good" onclick="SESSION.bi++;renderBuild()">下一句 →</button></div>`;
  } else {
    const diff=T.map((t,i)=>`<span class="${flags[i]?'whit':'wmiss'}">${esc(t)}</span>`).join(' ');
    r.innerHTML=`<p style="color:var(--red);font-weight:700;margin-top:10px">还有出入（绿=对，红=错/缺）：</p><p style="font-size:16px;line-height:1.9">${diff}</p><p class="sub">修改后再检查，或继续点词块拼。</p>`;
  }
}
function pickTile(el){ BUILD.sel.push({i:+el.dataset.i, el}); el.classList.add('used'); renderBZ(); }
function undoTile(){ const l=BUILD.sel.pop(); if(l) l.el.classList.remove('used'); renderBZ(); }
function renderBZ(){ document.getElementById('bz').innerHTML = BUILD.sel.map(t=>`<span class="tile">${esc(BUILD.toks[t.i])}</span>`).join(''); }
function checkBuild(id){
  const s=BY_ID[id];
  const ok = BUILD.sel.length===BUILD.toks.length && BUILD.sel.every((t,j)=>BUILD.toks[t.i].toLowerCase()===BUILD.toks[j].toLowerCase());
  const r=document.getElementById('buildResult');
  if(ok){
    grade(S.cards[id],1); save(); speak(s.malay);
    r.innerHTML=`<p style="color:var(--p);font-weight:700;margin-top:10px">✅ 正确！${wordify(s.malay)}</p>
    <div class="gradebtns"><button class="btn ghost" onclick="genCardById(${id})">🖼 卡片</button><button class="btn g-easy" onclick="bonusEasy2(${id})">很轻松</button><button class="btn g-good" onclick="SESSION.bi++;renderBuild()">下一句 →</button></div>`;
  } else {
    r.innerHTML=`<p style="color:var(--red);font-weight:700;margin-top:10px">还不对，再调整一下（可撤销重排）</p>`;
  }
}
function bonusEasy2(id){ const c=S.cards[id]; c.ivl=Math.round(c.ivl*1.3)+1; c.due=dayNum()+c.ivl; save(); SESSION.bi++; renderBuild(); }
function giveupBuild(id){
  const s=BY_ID[id]; grade(S.cards[id],0); save(); speak(s.malay);
  document.getElementById('buildResult').innerHTML=`<p style="margin-top:10px"><b>${wordify(s.malay)}</b></p>
  <p class="sub">跟读一遍再走：</p><div class="gradebtns"><button class="btn g-again" onclick="SESSION.bi++;renderBuild()">记住了，下一句 →</button></div>`;
}

/* --- 完成 --- */
function finishSession(){
  const min = Math.round((Date.now()-SESSION.t0)/60000);
  const k=todayKey();
  S.log[k] = S.log[k] || {new:0, reviewed:0, minutes:0};
  S.log[k].new += SESSION.newIds.length;
  S.log[k].reviewed += SESSION.counts.quiz + SESSION.buildQueue.length;
  S.log[k].minutes += min;
  save(); SESSION.active=false; stopTimer();
  const c=levelCounts();
  view().innerHTML=`<div class="card center">
    <div class="done-icon">🎉</div>
    <h2>今日学习完成！用时 ${min} 分钟</h2>
    <p class="sub" style="margin:8px 0">错词抽测 ${SESSION.counts.wb} 个（对${SESSION.counts.wbRight}）· 新学 ${SESSION.newIds.length} 句 · 复习 ${SESSION.counts.quiz} 题（正确率 ${SESSION.counts.quiz?Math.round(SESSION.counts.quizRight/SESSION.counts.quiz*100):100}%）· 造句 ${SESSION.buildQueue.length} 句</p>
    <p class="sub">当前：①认读 ${c[1]} · ②听说 ${c[2]} · ③运用 ${c[3]} · ★精通 ${c[4]} · 连续 ${streak()} 天</p>
    <div class="row" style="justify-content:center;margin-top:10px">
      <button class="btn ghost" onclick="genCard('Hari ini saya belajar '+${SESSION.newIds.length}+' ayat bahasa Melayu baharu!','今日打卡：新学${SESSION.newIds.length}句 · 复习${SESSION.counts.quiz}题 · 连续${streak()}天')">🖼 生成今日打卡卡片</button>
      <button class="btn" onclick="NAV='home';render()">返回首页</button>
    </div>
  </div>`;
}
function renderDone(){ finishSession(); }

/* --- 快捷模式 --- */
function quickShadow(){
  const learned = SENTENCES.filter(s=>S.cards[s.id]);
  const pool = (learned.length?shuffle(learned):SENTENCES.slice(0,20)).slice(0,20);
  SESSION.active=true; SESSION.step=2; SESSION.newIds=pool.map(s=>s.id); SESSION.si=0;
  SESSION.quizQueue=[]; SESSION.buildQueue=[]; SESSION.counts={quiz:0,quizRight:0};
  const _next=nextStep; startTimer();
  // 复用跟读界面，结束直接完成
  SESSION.step=2; SESSION._shadowOnly=true; renderShadowOnly();
}
function renderShadowOnly(){
  const ids=SESSION.newIds, i=SESSION.si;
  if(i>=ids.length){ SESSION.active=false; stopTimer(); view().innerHTML=`<div class="card center"><div class="done-icon">🎧</div><p>听力循环完成（${ids.length}句）</p><button class="btn big" onclick="NAV='home';render()">返回</button></div>`; return; }
  const s=BY_ID[ids[i]];
  view().innerHTML = `<div class="card">
    <h2>听力循环 <span class="sub">${i+1}/${ids.length}（随机20句已学内容）</span></h2>
    <div class="malay" style="margin:16px 0 6px">${wordify(s.malay)}</div><div class="zh sub">${esc(s.chinese)}</div>
    <div class="row" style="margin-top:14px">
      <button class="btn" onclick="speak('${esc(s.malay).replace(/'/g,"\\'")}')">🔊</button>
      <button class="btn ghost" onclick="speak('${esc(s.malay).replace(/'/g,"\\'")}',0.6)">🐢</button>
      ${recAvail()?`<button class="mic" id="micBtn" onclick="doShadowRec(${s.id})">🎙 评分</button>`:''}
      <button class="btn g-good" onclick="SESSION.si++;renderShadowOnly()">下一句 →</button>
    </div><div id="recResult"></div></div>`;
  speak(s.malay);
}
function quickQuiz(){
  SESSION.active=true; SESSION.newIds=[]; SESSION.counts={quiz:0,quizRight:0,wb:0,wbRight:0};
  SESSION.due=dueCards(); SESSION.quizQueue=SESSION.due.filter(id=>S.cards[id].lvl<3);
  SESSION.buildQueue=SESSION.due.filter(id=>S.cards[id].lvl>=3).slice(0,10);
  SESSION.wbQueue=[]; SESSION.qi=0; SESSION.bi=0; SESSION.step=4; startTimer(); renderQuiz();
}

/* ================= 全书浏览 ================= */
let openChap=null;
function renderBrowse(){
  const groups={};
  SENTENCES.forEach(s=>{ (groups[s.chapterName]=groups[s.chapterName]||[]).push(s); });
  view().innerHTML = `<div class="card"><h2>全书 900 句</h2>
  ${Object.entries(groups).map(([name,arr],gi)=>{
    const done=arr.filter(s=>S.cards[s.id]&&S.cards[s.id].lvl>=1).length;
    const open = openChap===gi;
    const isStart = S.settings.startId===arr[0].id;
    return `<div class="chap" onclick="openChap=${open?'null':gi};renderBrowse()"><span>${open?'▾':'▸'} ${isStart?'▶ ':''}${esc(name)}</span>
    <span class="row" style="gap:6px"><span class="sub">${arr[0].id}-${arr[arr.length-1].id} · 已学${done}/${arr.length}</span>
    <button class="btn ${isStart?'':'ghost'} small" onclick="event.stopPropagation();setStart(${arr[0].id},'${esc(name)}')">${isStart?'当前起点':'从此开始学'}</button></span></div>
    ${open?`<div class="slist">${arr.map(s=>{
      const c=S.cards[s.id]; const lvl=c?c.lvl:0;
      return `<div class="sitem"><button class="play" onclick="event.stopPropagation();speak('${esc(s.malay).replace(/'/g,"\\'")}')">🔊</button>
      <div class="tx"><div class="ma">${s.id}. ${wordify(s.malay)}</div><div class="zc">${esc(s.chinese)}</div></div>
      <span class="badge ${LVL_CLS[lvl]}">${LVL_NAME[lvl]}</span></div>`;}).join('')}</div>`:''}`;
  }).join('')}</div>`;
}

/* ================= 单词本 ================= */
function renderWordbook(){
  const all = Object.entries(S.wordbook).sort((a,b)=>(b[1].err-b[1].right)-(a[1].err-a[1].right));
  const active = all.filter(([w,x])=>x.right-x.err<3);
  const grad = all.filter(([w,x])=>x.right-x.err>=3);
  const item = ([w,x])=>{
    const hit=lookupWord(w);
    return `<div class="wbitem">
      <button class="play" onclick="speak('${esc(w)}')">🔊</button>
      <div style="flex:1" class="cw" data-w="${esc(w)}" onclick="showWord(this.dataset.w)" style="border:none">
        <span class="w">${esc(w)}</span> <span class="g">${hit?esc(hit.g):'(点击看例句)'}</span><br>
        <span class="sub" style="font-size:12px">${x.src==='auto'?'跟读误读自动收录':'手动加入'} · ${x.added}</span></div>
      <span class="errn">错${x.err}</span><span class="okn">对${x.right}</span>
      <button class="btn gray small" onclick="removeWB('${esc(w)}')">移除</button></div>`;
  };
  view().innerHTML = `
  <div class="card"><h2>📒 常错单词本 <span class="sub">${active.length} 个待攻克 · ${grad.length} 个已毕业</span></h2>
    <div class="sub" style="margin-bottom:8px">收录来源：跟读评分中读错的词（自动）+ 你点词后手动加入。每天学习的第①环节会从这里抽最多6个词测试；净答对3次即毕业。</div>
    ${active.length?active.map(item).join(''):'<p class="sub" style="padding:14px 0">暂无待攻克的词。跟读评分读错的词会自动出现在这里。</p>'}
  </div>
  ${grad.length?`<div class="card"><h2>✅ 已毕业 <span class="sub">净答对≥3次</span></h2>${grad.map(item).join('')}</div>`:''}`;
}

/* ================= 统计 ================= */
function renderStats(){
  const c=levelCounts();
  const days=Object.keys(S.log).sort();
  const totalMin=days.reduce((t,k)=>t+(S.log[k].minutes||0),0);
  const t=dayNum();
  const forecast=[0,1,2,3,4,5,6].map(off=>Object.values(S.cards).filter(x=>x.due===t+off).length);
  view().innerHTML=`
  <div class="card"><h2>总体统计</h2>
    <div class="statgrid">
      <div class="stat"><div class="n">${900-c[0]}</div><div class="l">已学句子</div></div>
      <div class="stat"><div class="n">${c[4]}</div><div class="l">已精通</div></div>
      <div class="stat"><div class="n">${days.length}</div><div class="l">学习天数</div></div>
      <div class="stat"><div class="n">${Math.round(totalMin/60*10)/10}</div><div class="l">累计小时</div></div>
    </div>
    <div class="lvlrow"><div class="t"><span class="badge b0">未学</span><span>${c[0]}</span></div></div>
    <div class="lvlrow"><div class="t"><span class="badge b1">①认读</span><span>${c[1]}</span></div><div class="bar"><div style="width:${c[1]/9}%;background:var(--blue)"></div></div></div>
    <div class="lvlrow"><div class="t"><span class="badge b2">②听说</span><span>${c[2]}</span></div><div class="bar"><div style="width:${c[2]/9}%;background:var(--amber)"></div></div></div>
    <div class="lvlrow"><div class="t"><span class="badge b3">③运用</span><span>${c[3]}</span></div><div class="bar"><div style="width:${c[3]/9}%;background:var(--p)"></div></div></div>
    <div class="lvlrow"><div class="t"><span class="badge bm">★精通</span><span>${c[4]}</span></div><div class="bar"><div style="width:${c[4]/9}%;background:var(--gold)"></div></div></div>
  </div>
  <div class="card"><h2>未来7天复习量预测</h2>
    <div class="row" style="align-items:flex-end;height:90px;gap:6px">
    ${forecast.map((n,i)=>`<div style="flex:1;text-align:center"><div style="background:var(--p);opacity:.75;border-radius:4px 4px 0 0;height:${Math.min(80,n*3)}px"></div><div class="sub" style="font-size:11px">${i===0?'今天':'+'+i}<br>${n}</div></div>`).join('')}
    </div>
  </div>
  <div class="card"><h2>最近学习记录</h2>
    ${days.slice(-14).reverse().map(k=>`<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--line);padding:7px 0;font-size:13.5px"><span>${k}</span><span class="sub">新学${S.log[k].new} · 复习${S.log[k].reviewed} · ${S.log[k].minutes}分钟</span></div>`).join('')||'<p class="sub">暂无记录</p>'}
  </div>`;
}

/* ================= 设置 ================= */
function renderSettings(){
  view().innerHTML=`
  <div class="card"><h2>学习设置</h2>
    <div style="margin:12px 0"><b>每天新句数量</b><div class="sub">10句/天≈3个月学完全书（推荐）；赶进度可调高，复习压力会相应增大</div>
      <div class="row" style="margin-top:6px">${[5,8,10,12,15].map(n=>`<span class="pill ${S.settings.newPerDay===n?'on':''}" onclick="S.settings.newPerDay=${n};save();renderSettings()">${n}句</span>`).join('')}</div></div>
    <div style="margin:12px 0"><b>朗读语速</b>
      <div class="row" style="margin-top:6px">${[[0.7,'慢'],[0.85,'适中'],[1.0,'正常']].map(([r,n])=>`<span class="pill ${S.settings.rate===r?'on':''}" onclick="S.settings.rate=${r};save();renderSettings()">${n} ${r}</span>`).join('')}</div></div>
    <div style="margin:12px 0"><b>朗读语音</b><div class="sub">优先 ms-MY（马来语）> id-ID（印尼语，发音≈90%接近）；列表为空说明系统没装语音包（见首页横幅说明）。选好后点测试。</div>
      <div class="row" style="margin-top:6px">
      <select onchange="S.settings.voiceURI=this.value||null;save();pickVoice()" style="max-width:70%">
        <option value="">自动选择</option>
        ${[...VOICES].sort((a,b)=>{const p=v=>/^ms/i.test(v.lang)?0:/^id/i.test(v.lang)?1:2;return p(a)-p(b);}).map(v=>`<option value="${v.voiceURI}" ${S.settings.voiceURI===v.voiceURI?'selected':''}>${/^(ms|id)/i.test(v.lang)?'★ ':''}${v.name} (${v.lang})</option>`).join('')}
      </select>
      <button class="btn small" onclick="speak('Selamat pagi! Apa khabar?')">🔊 测试</button></div></div>
    <div style="margin:12px 0"><b>每日复习上限</b>
      <div class="row" style="margin-top:6px">${[50,80,120].map(n=>`<span class="pill ${S.settings.maxReview===n?'on':''}" onclick="S.settings.maxReview=${n};save();renderSettings()">${n}题</span>`).join('')}</div></div>
    <div style="margin:12px 0"><b>🎙 语音识别语言</b><div class="sub">跟读评分总是0分且"识别到"显示中文/乱码时，切换为印尼语——Google识别引擎对印尼语支持更好，且与马来语发音高度互通</div>
      <div class="row" style="margin-top:6px">${[['ms-MY','马来语 ms-MY'],['id-ID','印尼语 id-ID（推荐备选）']].map(([v,n])=>`<span class="pill ${S.settings.recLang===v?'on':''}" onclick="S.settings.recLang='${v}';save();renderSettings()">${n}</span>`).join('')}</div></div>
    <div style="margin:12px 0"><b>学习起点</b><div class="sub">当前从第 ${S.settings.startId} 句开始取新句（在📖全书页可任选章节作为起点，学完回卷补前面）</div>
      ${S.settings.startId>1?'<button class="btn ghost small" style="margin-top:6px" onclick="S.settings.startId=1;save();renderSettings()">恢复从头开始</button>':''}</div>
    <div style="margin:12px 0"><b>🎤 麦克风免重复授权</b><div class="sub">直接双击HTML（file://方式）浏览器无法记住麦克风授权，每次都会问。解决：改用文件夹里的「启动学习程序.bat」打开——它通过 localhost 本地服务打开页面，授权一次永久记住。</div></div>
  </div>
  <div class="card"><h2>数据管理</h2>
    <div class="sub" style="margin-bottom:10px">进度保存在本浏览器中。换电脑/换浏览器前请先导出备份。</div>
    <div class="row">
      <button class="btn ghost" onclick="exportData()">📤 导出进度</button>
      <button class="btn ghost" onclick="document.getElementById('impFile').click()">📥 导入进度</button>
      <button class="btn warn" onclick="if(confirm('确定清空全部学习进度？此操作不可恢复！'))''+(localStorage.removeItem(LS_KEY)||location.reload())">🗑 重置全部</button>
    </div>
    <input type="file" id="impFile" class="hidden" accept=".json" onchange="importData(this)">
  </div>
  <div class="card sub" style="font-size:12.5px">数据来源：《马来西亚语900句》（广西人民出版社）全书 OCR 提取（900/900 完整，已人工核对）。间隔重复算法：简化 SM-2。等级体系：①认读(看懂)→②听说(听懂+跟读)→③运用(凭中文重构句子)→★精通(30天以上间隔仍答对)。</div>`;
}
function exportData(){
  const blob=new Blob([JSON.stringify(S)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='malay900_progress_'+todayKey()+'.json'; a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.cards) throw 0; S=d; save(); alert('导入成功！'); render(); }catch(e){ alert('文件格式不正确'); } };
  r.readAsText(f);
}

render();
</script>
</body>
</html>
